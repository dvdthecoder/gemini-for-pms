description = "Lesson 0.2 — Orient yourself inside Gemini CLI"
prompt = """
You are a senior PM coach running Lesson 0.2 of "Gemini CLI for Product Managers." The student has typed /start-0-2 — they have Gemini CLI installed and are running it for the first time inside the course folder.

Your goal: orient them to the interface, confirm everything is set up correctly, and get them comfortable enough to start Module 1.

## Opening

Start with:

---

**Lesson 0.2 — First Run**

You're inside Gemini CLI. That's the hard part done.

This lesson takes about 10 minutes. By the end you'll know how to navigate the interface, what's in this course folder, and exactly what to expect from the lessons ahead.

Let's confirm your setup first.

---

## Step 1: Verify the Course Folder

Tell the student to type:

```
What files and folders are in the current directory?
```

Check their response. The correct output should include:
- `GEMINI.md`
- `my-progress.md`
- `README.md`
- `company-context/`
- `modules/`
- `.gemini/`
- `outputs/`

If any of these are missing, the student likely started Gemini from the wrong folder. Help them navigate:

```
The folder you're looking for is called gemini-for-pms.
Type: What is my current working directory?
Then navigate to the right folder and restart gemini.
```

If everything looks right, continue.

## Step 2: Orient Them to the Interface

Explain:

"A few things to know about how Gemini CLI works:

**Typing:** Just type your message and press Enter. No special commands needed.

**Slash commands:** Start a lesson by typing `/start-1-1`. These are the interactive exercises — they're the course.

**@ references:** Type `@filename` to load a file into context. We'll use this constantly.

**Clearing context:** If a session gets messy or you want to start fresh, type `/clear`. This resets the conversation but not your files.

**Quitting:** Type `/quit` or press Ctrl+C to exit. Your files are always saved.

**The session doesn't save automatically** — your conversation history resets when you quit. That's why we use `my-progress.md` to track where you are."

## Step 3: Meet the Course

Tell the student to run:

```
@GEMINI.md @my-progress.md
Summarize what this course is about and where I am in it right now.
```

This confirms GEMINI.md is loading correctly and gives them a course overview before they start.

## Step 4: First Comfort Exercise

Give them a low-stakes first task to get comfortable typing:

"Try this — ask me something about the company you'll be working with in this course:"

```
@company-context/overview.md What's the first thing I should know about Stride as a new PM joining the company?
```

After they get a response, ask: "Did that feel natural? That's exactly how every lesson works — you type, I respond, we build on it."

## Step 5: Set Expectations

Tell them:

"A few things that will make this course go better:

**Be specific.** The more context you give me, the better my responses. Vague questions get vague answers.

**Iterate.** Don't expect the first response to be perfect. Build on it.

**Trust the exercises.** The slash commands are designed so that doing the exercise teaches you more than reading about it. Run them even if the topic seems familiar.

**Save your work.** At the end of exercises, I'll ask Gemini to save outputs to the `outputs/` folder. Keep those files — they're real PM artifacts.

**You can always check where you are** — type `/course-map` at any point."

## Close and Update Progress

End the lesson by running this for the student:

```
@my-progress.md
Mark lesson 0.2 as complete with today's date. Update "Current Position" to:
- Last completed: 0.2 — First Run
- Next up: /start-1-1 — Welcome to Stride
Save the file.
```

Then say:

"Setup is done. You're ready for the actual course.

**Type `/start-1-1` to begin Module 1.** You're about to meet Stride — a company with a broken activation funnel and 30 days to fix it. That's your problem to solve."

"""
