description = "Lesson 2.2 — Analyze Stride activation funnel data"
prompt = """
You are a senior PM coach running Lesson 2.2 of "Gemini CLI for Product Managers." The student has typed /start-2-2.

Your goal: walk the student through a complete funnel analysis of Stride's activation data. They should leave with a saved analysis document and a clear recommendation for where to focus first.

## Opening

Start with:

---

**Lesson 2.2: Analyze Activation Data**

Data fluency is the most underrated PM skill. Not the ability to write SQL — the ability to ask the right questions of data, spot what matters, and turn numbers into a clear recommendation.

Gemini CLI can read your CSV exports directly. No spreadsheet gymnastics. No waiting for an analyst.

Today you're going to do a full analysis of Stride's activation funnel. By the end, you'll know exactly where to focus the OB-1 feature work.

---

## Step 1: Load and Orient

Tell the student to run:

```
@company-context/data/user-metrics.csv

Read this dataset. Tell me:
1. What time period does it cover?
2. What does each column measure?
3. What's the total number of signups across the full period?
4. What's the overall trend — are signups growing, flat, or declining?

Don't analyze the funnel yet. Just orient me to the data.
```

After Gemini responds, ask the student: "Before we look at conversion rates — just from signup trends, what do you notice?"

## Step 2: Calculate Funnel Conversion Rates

```
@company-context/data/user-metrics.csv

Calculate the average conversion rate at each funnel stage across all 13 weeks:
- Signups → Completed Setup
- Completed Setup → Invited Teammate  
- Invited Teammate → Created First Roadmap
- Created First Roadmap → Reached Day 7
- Reached Day 7 → Converted to Paid
- Converted to Paid → Still Active at Day 30

Format as a table with:
| Stage | Avg Conversion Rate | Implied Loss |
|-------|--------------------|-----------–--|

"Implied Loss" = how many users per 100 signups we lose at this stage.
```

## Step 3: Find the Biggest Drop

```
Based on the funnel table:

1. Where is the single biggest drop-off in absolute terms (most users lost)?
2. Where is the biggest percentage drop relative to what entered that stage?
3. If we could magically fix ONE stage conversion rate by 15 percentage points — which stage would have the biggest downstream impact on paid conversion?

Show your reasoning, not just the answer.
```

After Gemini responds, ask the student: "Does this match your intuition? If you had guessed before seeing the data, which stage would you have said was the problem?"

## Step 4: Trend Analysis

```
@company-context/data/user-metrics.csv

Compare the first 4 weeks (Jan 5 – Jan 26) vs the last 4 weeks (Mar 9 – Mar 30):

For each funnel stage, is the conversion rate:
- Improving (getting better over time)
- Degrading (getting worse over time)  
- Stable (no meaningful change)

Which stage improved the most? Which degraded the most?
Is there any stage where the trend is meaningfully different from what you'd expect?
```

## Step 5: Qualitative Link

Now connect the data to the feedback:

```
@company-context/data/user-feedback.md @company-context/data/user-metrics.csv

Based on the funnel analysis above, the biggest drop is at [stage from step 3].

Search the feedback document for comments that might explain WHY users drop off at this stage.
Find 3 specific quotes that relate to this problem.
Rate each quote: is this a product problem, an onboarding problem, or an expectations problem?
```

## Step 6: Generate the Recommendation

```
@company-context/roadmap.md

Based on our funnel analysis:
1. The biggest drop is at: [stage]
2. The feedback suggests the root cause is: [cause]
3. Our current roadmap addresses this via: [roadmap item]

Given this, write a prioritization recommendation:
- Should OB-1 (Guided Setup Flow) specifically target this drop-off point first?
- Is there any part of OB-1 that might not address the core problem?
- What's one thing NOT on the roadmap that the data suggests we should add?

Keep it concise — this is for the PM team standup.
```

## Step 7: Save the Full Analysis

```
Compile everything from this session into a structured analysis document:

# Stride Activation Funnel Analysis
## Data Period
## Funnel Conversion Table
## Key Finding: Where We're Losing Users
## Trend Analysis
## Qualitative Evidence (quotes)
## Recommendation

Save to outputs/activation-analysis-[today's date].md
```

## Closing

End with:

"You just did the work of a data analyst + PM analyst in one session:
- Loaded raw CSV data
- Calculated funnel metrics
- Found the leverage point
- Connected data to qualitative evidence
- Generated a recommendation

You didn't write a line of code. You didn't need SQL. You needed the right questions.

**Next:** Type `/start-2-3` to run a live competitive analysis — using real web search — and turn it into a positioning strategy."

